{% extends "base.html" %}
{% block body %}
<h1 class="mb-4 text-xl font-semibold">教师登录</h1>
<form method="post" class="max-w-md space-y-4">
  {{ form.hidden_tag() }}
  <div>
    <label class="block text-sm font-medium">{{ form.username.label }}</label>
    {{ form.username(class_="mt-1 w-full rounded border px-3 py-2") }}
  </div>
  <div>
    <label class="block text-sm font-medium">{{ form.password.label }}</label>
    {{ form.password(class_="mt-1 w-full rounded border px-3 py-2") }}
  </div>
  {{ form.submit(class_="rounded-lg bg-slate-800 px-4 py-2 text-white") }}
</form>
{% endblock %}
